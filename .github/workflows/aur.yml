name: Update AUR

on:
  release:
    types: [published]

jobs:
  aur:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release tarball
        run: gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --pattern '*.tar.gz'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compute SHA256
        id: hash
        run: echo "sha256=$(sha256sum *.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=('[^']*')/sha256sums=('${{ steps.hash.outputs.sha256 }}')/" PKGBUILD

      - name: Checkout AUR repo
        uses: actions/checkout@v4
        with:
          repository: mikelexp/appmeup-bin
          ssh-key: ${{ secrets.AUR_SSH_KEY }}
          path: aur
          ref: master

      - name: Copy PKGBUILD to AUR repo
        run: cp PKGBUILD aur/

      - name: Generate .SRCINFO
        run: |
          docker run --rm -v "$(pwd)/aur:/build" archlinux:latest bash -c "
            pacman -Syu --noconfirm base-devel >/dev/null 2>&1
            cd /build
            useradd -m builder
            chown -R builder /build
            su builder -c 'makepkg --printsrcinfo' > /build/.SRCINFO
          "

      - name: Commit and push to AUR
        working-directory: aur
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.version.outputs.version }}"
          git push origin master
